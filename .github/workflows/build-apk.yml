name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get 2>&1 | tee build.log

      - name: Build APK
        run: flutter build apk --release 2>&1 | tee -a build.log || true

      - name: List build output
        run: |
          echo "=== Build log (last 100 lines) ==="
          tail -100 build.log
          echo "=== APK files ==="
          find build -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo "=== flutter-apk dir ==="
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "Directory not found"

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meeting-ai-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
          if-no-files-found: warn
